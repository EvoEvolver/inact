{% extends "base.html" %}

{% block body_wrap %}
<style>
.aside-top {
  padding: 8px 14px 6px; display: flex; align-items: center;
  justify-content: space-between; border-bottom: 1px solid #f0f0f0; flex-shrink: 0;
}
.aside-top-title { font-size: 12px; font-weight: 700; color: #555; }
.aside-action-btn {
  background: none; border: 1px solid #ddd; cursor: pointer; color: #555;
  font-size: 11px; padding: 3px 8px; border-radius: 5px;
}
.aside-action-btn:hover { background: #f0f0f0; }
.pag-row {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 14px; border-top: 1px solid #f0f0f0; flex-shrink: 0;
}
.pag-btn {
  background: none; border: 1px solid #ddd; border-radius: 5px;
  cursor: pointer; color: #555; font-size: 12px; padding: 3px 10px;
}
.pag-btn:hover:not([disabled]) { background: #f5f5f5; }
.pag-btn[disabled] { color: #ccc; border-color: #eee; cursor: default; }
.pag-info { font-size: 12px; color: #888; min-width: 44px; text-align: center; }
.unread-badge {
  display: inline-block; background: #0066cc; color: #fff;
  border-radius: 10px; font-size: 11px; padding: 1px 6px; margin-left: 4px;
  vertical-align: middle;
}
.kind-human, .kind-agent {
  display: inline-block; border-radius: 4px; font-size: 10px;
  padding: 1px 5px; margin-left: 4px; font-weight: 600; vertical-align: middle;
}
.kind-human { background: #e8f5e9; color: #388e3c; }
.kind-agent { background: #e3f2fd; color: #1565c0; }
#new-session-panel {
  display: none; flex-direction: column; overflow-y: auto;
  padding: 28px 28px 20px; background: #fafafa; flex: 1;
}
#new-session-panel h2 { font-size: 18px; margin: 0 0 20px; font-weight: 700; }
#new-session-panel label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 4px; }
#new-session-panel input[type=text] { width: 100%; margin-bottom: 16px; }
.member-check-list {
  max-height: 240px; overflow-y: auto; border: 1px solid #ddd;
  border-radius: 8px; background: #fff;
}
.member-check-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 14px;
  border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 14px;
}
.member-check-item:last-child { border-bottom: none; }
.member-check-item:hover { background: #f5f5f5; }
.member-check-item input[type=checkbox] { width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; }
.panel-actions { display: flex; gap: 10px; margin-top: 20px; }
.panel-actions button { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; }
.btn-cancel { background: #f0f0f0; color: #444; }
.btn-cancel:hover { background: #e0e0e0; }
</style>

<div class="app" style="height:calc(100vh - 45px)">
  <div class="layout">
    <aside style="display:flex;flex-direction:column;overflow:hidden">

      <!-- Header -->
      <div class="aside-top">
        <span class="aside-top-title">Messages</span>
        <button class="aside-action-btn" id="new-session-btn">+ New</button>
      </div>

      <!-- Scrollable session list -->
      <div id="session-list" style="flex:1;overflow-y:auto">
        <div style="padding:12px 14px;font-size:13px;color:#bbb">Loading…</div>
      </div>

      <!-- Pagination bar -->
      <div id="sess-pagination"></div>

    </aside>

    <main>
      <!-- Chat area -->
      <div id="chat-area" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        <div class="chat-title" id="chat-title">Select a session</div>
        <div id="messages">
          <div class="placeholder">← choose a session</div>
        </div>
        <div class="compose">
          <div class="compose-row">
            <textarea id="inp" placeholder="Type a message… (Enter to send)" disabled></textarea>
            <button class="send" id="send-btn" disabled>Send</button>
          </div>
        </div>
      </div>

      <!-- New session creation panel -->
      <div id="new-session-panel">
        <h2>New Session</h2>
        <label for="session-name-inp">Session name (optional)</label>
        <input type="text" id="session-name-inp" placeholder="e.g. Project Alpha">
        <label>Members</label>
        <div class="member-check-list" id="member-check-list">
          <div style="padding:12px 14px;font-size:13px;color:#bbb">Loading…</div>
        </div>
        <div class="panel-actions">
          <button class="primary" id="create-session-btn">Create Session</button>
          <button class="btn-cancel" id="cancel-session-btn">Cancel</button>
        </div>
        <div id="create-session-err" class="err" style="display:none"></div>
      </div>
    </main>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const P  = {{ prefix        | tojson }};
const AP = {{ agents_prefix | tojson }};

let myId   = localStorage.getItem('inact_agent_id') || '';
let myName = localStorage.getItem('inact_name')     || '';
const myKey = localStorage.getItem('inact_api_key') || '';

if (!myKey) { location.href = '/_human' + AP; }

async function ensureId() {
  if (myId) return;
  try {
    const text = await fetch(AP + '/.me', {headers: {'X-Api-Key': myKey}}).then(r => r.text());
    const m = text.match(/^id\s*=\s*(\d+)/m);
    const n = (text.match(/^name\s*=\s*"([^"]*)"/m)  || [])[1] || '';
    const k = (text.match(/^kind\s*=\s*"([^"]*)"/m)  || [])[1] || 'agent';
    if (m) {
      myId   = m[1];
      const fallback = k === 'human' ? 'Human #' + myId : 'Agent #' + myId;
      myName = n || fallback;
      agentKindCache[myId] = k;
      localStorage.setItem('inact_agent_id', myId);
      localStorage.setItem('inact_name',     myName);
    }
  } catch (_) {}
}

// ── state ──────────────────────────────────────────────────────────────────
let selId = null, selName = '';
let msgTimer = null;
let sessPage = 1;
const SESS_PER_PAGE = 20;
let shownIds = new Set();
const agentNameCache = {};
const agentKindCache = {};
let allAgents = [];

// ── helpers ────────────────────────────────────────────────────────────────
function apiKey() { return localStorage.getItem('inact_api_key') || ''; }
function authHeaders(extra) {
  const h = {'X-Agent-Id': myId};
  const k = apiKey();
  if (k) h['X-Api-Key'] = k;
  return Object.assign(h, extra || {});
}

function parseBlocks(text, tag) {
  return text.split('[[' + tag + ']]').slice(1).map(b => {
    const o = {};
    b.split('\n').forEach(l => {
      const m = l.match(/^(\w+)\s*=\s*"([^"]*)"/) || l.match(/^(\w+)\s*=\s*(\S+)/);
      if (m) o[m[1]] = m[2];
    });
    return o;
  }).filter(o => Object.keys(o).length > 0);
}

async function getAgentName(id) {
  if (agentNameCache[id]) return agentNameCache[id];
  try {
    const text = await fetch(AP + '/' + id, {headers: authHeaders()}).then(r => r.text());
    const m = text.match(/^name\s*=\s*"([^"]*)"/m);
    const k = (text.match(/^kind\s*=\s*"([^"]*)"/m) || [])[1] || 'agent';
    agentKindCache[id] = k;
    const fallback = k === 'human' ? 'Human #' + id : 'Agent #' + id;
    const name = m ? m[1] : fallback;
    agentNameCache[id] = name;
    return name;
  } catch (_) { return agentKindCache[id] === 'human' ? 'Human #' + id : 'Agent #' + id; }
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── load agents for member picker ──────────────────────────────────────────
async function loadAllAgents() {
  try {
    const text = await fetch(AP + '/', {headers: authHeaders()}).then(r => r.text());
    allAgents = parseBlocks(text, 'agents');
    allAgents.forEach(a => {
      if (a.name) agentNameCache[a.id] = a.name;
      if (a.kind) agentKindCache[a.id] = a.kind;
    });
  } catch (_) {}
}

// ── session display name ───────────────────────────────────────────────────
function sessionDisplayName(sess) {
  if (sess.name) return sess.name;
  const others = (sess.member_ids || '').split(',').filter(id => id && id !== String(myId));
  if (!others.length) return 'Session ' + sess.id.slice(0, 6);
  const names = others.slice(0, 3).map(id => agentNameCache[id] || ('#' + id));
  return names.join(', ') + (others.length > 3 ? ', …' : '');
}

// ── session list ───────────────────────────────────────────────────────────
async function loadSessions(page) {
  sessPage = page || sessPage;
  try {
    const text = await fetch(
      P + '/sessions?per_page=' + SESS_PER_PAGE + '&page=' + sessPage,
      {headers: authHeaders()}
    ).then(r => r.text());

    const pm = text.match(/# page (\d+) of (\d+)/);
    const totalPages = pm ? parseInt(pm[2]) : 1;

    const sessions = parseBlocks(text, 'sessions');

    // Pre-warm name cache for all member IDs so display names are ready
    const toLoad = new Set();
    sessions.forEach(s => {
      (s.member_ids || '').split(',').forEach(id => { if (id && !agentNameCache[id]) toLoad.add(id); });
    });
    await Promise.all([...toLoad].map(id => getAgentName(id)));

    renderSessionList(sessions);
    renderPagination(sessPage, totalPages);
  } catch (_) {
    document.getElementById('session-list').innerHTML =
      '<div style="padding:8px 14px;font-size:13px;color:#bbb">Could not load sessions.</div>';
  }
}

function renderSessionList(sessions) {
  const list = document.getElementById('session-list');
  list.innerHTML = '';
  if (!sessions.length) {
    list.innerHTML =
      '<div style="padding:10px 14px;font-size:13px;color:#bbb">' +
      'No sessions yet.<br>Use + New to start one.</div>';
    return;
  }
  for (const s of sessions) {
    const name   = sessionDisplayName(s);
    const unread = parseInt(s.unread || '0', 10);
    const others = (s.member_ids || '').split(',').filter(id => id && id !== String(myId));
    const isDM   = others.length === 1;

    let kindBadge = '';
    if (isDM) {
      const k = agentKindCache[others[0]] || 'agent';
      kindBadge = k === 'human'
        ? '<span class="kind-human">human</span>'
        : '<span class="kind-agent">bot</span>';
    }

    const btn = document.createElement('button');
    btn.className = 'agent-btn';
    btn.dataset.id = s.id;
    btn.innerHTML = esc(name) + kindBadge +
      (unread > 0 ? `<span class="unread-badge">${unread}</span>` : '');
    btn.addEventListener('click', () => selectSession(s.id, name));
    if (String(s.id) === String(selId)) btn.classList.add('active');
    list.appendChild(btn);
  }
}

function renderPagination(page, totalPages) {
  const pag = document.getElementById('sess-pagination');
  pag.innerHTML = '';
  if (totalPages <= 1) return;
  const row = document.createElement('div');
  row.className = 'pag-row';
  const prev = document.createElement('button');
  prev.className = 'pag-btn'; prev.textContent = '←';
  if (page <= 1) prev.setAttribute('disabled', '');
  prev.addEventListener('click', () => { if (page > 1) loadSessions(page - 1); });
  const info = document.createElement('span');
  info.className = 'pag-info'; info.textContent = page + ' / ' + totalPages;
  const next = document.createElement('button');
  next.className = 'pag-btn'; next.textContent = '→';
  if (page >= totalPages) next.setAttribute('disabled', '');
  next.addEventListener('click', () => { if (page < totalPages) loadSessions(page + 1); });
  row.appendChild(prev); row.appendChild(info); row.appendChild(next);
  pag.appendChild(row);
}

// ── select session ─────────────────────────────────────────────────────────
function clearActive() {
  document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
}

function hidePanels() {
  document.getElementById('chat-area').style.display = 'flex';
  document.getElementById('new-session-panel').style.display = 'none';
}

function selectSession(id, name) {
  selId = id; selName = name;
  clearActive();
  const btn = document.querySelector(`.agent-btn[data-id="${id}"]`);
  if (btn) btn.classList.add('active');
  document.getElementById('chat-title').textContent = name;
  document.getElementById('inp').disabled      = false;
  document.getElementById('send-btn').disabled = false;
  shownIds.clear();
  document.getElementById('messages').innerHTML = '';
  hidePanels();
  if (msgTimer) clearInterval(msgTimer);
  pollSession();
  msgTimer = setInterval(pollSession, 3000);
}

// ── poll ───────────────────────────────────────────────────────────────────
async function pollSession() {
  if (!selId) return;
  const text = await fetch(
    P + '/sessions/' + selId + '/messages?per_page=100',
    {headers: authHeaders()}
  ).then(r => r.text()).catch(() => '');

  const msgs = parseBlocks(text, 'messages').filter(m => m.id && !shownIds.has(m.id));
  const box  = document.getElementById('messages');
  let added  = 0;
  for (const m of msgs) {
    shownIds.add(m.id);
    const isMe = m.from === String(myId);
    const senderName = isMe ? 'You' : (agentNameCache[m.from] || await getAgentName(m.from));
    const fromKind   = m.from_kind || agentKindCache[m.from] || 'agent';
    const kindBadge  = !isMe
      ? (fromKind === 'human'
          ? '<span class="kind-human">human</span>'
          : '<span class="kind-agent">bot</span>')
      : '';
    const wrap = document.createElement('div');
    wrap.className = 'wrap-msg ' + (isMe ? 'sent' : 'recv');
    const ts = m.date ? new Date(m.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
    wrap.innerHTML =
      '<div class="bubble">' + esc(m.body || '') + '</div>' +
      '<div class="msg-meta">' + esc(senderName) + kindBadge + (ts ? ' · ' + ts : '') + '</div>';
    box.appendChild(wrap);
    added++;
  }
  if (added) box.scrollTop = box.scrollHeight;
}

// ── send ───────────────────────────────────────────────────────────────────
async function send() {
  const inp  = document.getElementById('inp');
  const body = inp.value.trim();
  if (!body || !selId) return;
  inp.value = ''; inp.disabled = true; document.getElementById('send-btn').disabled = true;
  await fetch(P + '/sessions/' + selId + '/send', {
    method: 'POST',
    headers: authHeaders({'Content-Type': 'application/json'}),
    body: JSON.stringify({from: myId, body})
  }).catch(() => {});
  await pollSession();
  inp.disabled = false; document.getElementById('send-btn').disabled = false; inp.focus();
}

// ── new session panel ──────────────────────────────────────────────────────
function showNewSessionPanel() {
  if (msgTimer) clearInterval(msgTimer);
  clearActive();
  document.getElementById('chat-area').style.display        = 'none';
  document.getElementById('new-session-panel').style.display = 'flex';
  document.getElementById('session-name-inp').value = '';
  document.getElementById('create-session-err').style.display = 'none';
  populateMemberList();
}

function populateMemberList() {
  const container = document.getElementById('member-check-list');
  const others = allAgents.filter(a => String(a.id) !== String(myId));
  if (!others.length) {
    container.innerHTML =
      '<div style="padding:12px 14px;font-size:13px;color:#bbb">No other participants available.</div>';
    return;
  }
  container.innerHTML = '';
  others.forEach(a => {
    const kind  = agentKindCache[a.id] || a.kind || 'agent';
    const label = agentNameCache[a.id] || a.name || (kind === 'human' ? 'Human #' + a.id : 'Agent #' + a.id);
    const badge = kind === 'human'
      ? '<span class="kind-human">human</span>'
      : '<span class="kind-agent">bot</span>';
    const item = document.createElement('label');
    item.className = 'member-check-item';
    item.innerHTML = `<input type="checkbox" value="${a.id}"><span>${esc(label)}</span>${badge}`;
    container.appendChild(item);
  });
}

async function createSession() {
  const name   = document.getElementById('session-name-inp').value.trim();
  const errEl  = document.getElementById('create-session-err');
  const checked = [...document.querySelectorAll('#member-check-list input[type=checkbox]:checked')];
  if (!checked.length) {
    errEl.textContent = 'Select at least one member.';
    errEl.style.display = 'block';
    return;
  }
  const members = checked.map(cb => cb.value);
  const btn = document.getElementById('create-session-btn');
  btn.disabled = true; btn.textContent = 'Creating…'; errEl.style.display = 'none';

  const res = await fetch(P + '/sessions', {
    method: 'POST',
    headers: authHeaders({'Content-Type': 'application/json'}),
    body: JSON.stringify({name, created_by: myId, members})
  }).then(r => r.text()).catch(() => '');
  btn.disabled = false; btn.textContent = 'Create Session';

  const idMatch = res.match(/^id\s*=\s*"([^"]+)"/m);
  if (!idMatch) {
    errEl.textContent = 'Failed to create session. Please try again.';
    errEl.style.display = 'block';
    return;
  }
  await loadSessions(1);
  const displayName = name ||
    members.slice(0, 2).map(id => agentNameCache[id] || ('#' + id)).join(', ') +
    (members.length > 2 ? ', …' : '');
  selectSession(idMatch[1], displayName);
}

// ── event listeners ────────────────────────────────────────────────────────
document.getElementById('send-btn').addEventListener('click', send);
document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById('new-session-btn').addEventListener('click', showNewSessionPanel);
document.getElementById('create-session-btn').addEventListener('click', createSession);
document.getElementById('cancel-session-btn').addEventListener('click', () => {
  hidePanels();
  if (selId) {
    document.getElementById('chat-title').textContent = selName;
    document.getElementById('inp').disabled      = false;
    document.getElementById('send-btn').disabled = false;
    if (msgTimer) clearInterval(msgTimer);
    pollSession();
    msgTimer = setInterval(pollSession, 3000);
    const btn = document.querySelector(`.agent-btn[data-id="${selId}"]`);
    if (btn) btn.classList.add('active');
  } else {
    document.getElementById('chat-title').textContent = 'Select a session';
    document.getElementById('messages').innerHTML = '<div class="placeholder">← choose a session</div>';
    document.getElementById('inp').disabled      = true;
    document.getElementById('send-btn').disabled = true;
  }
});

// ── init ───────────────────────────────────────────────────────────────────
ensureId().then(async () => {
  await loadAllAgents();
  await loadSessions(1);
  setInterval(() => loadSessions(sessPage), 10000);
});
</script>
{% endblock %}
