{% extends "base.html" %}
{% block content %}
<h1 class="page-title">{{ title }}</h1>
<table class="ls-table">
  <thead>
    <tr><th></th><th>Name</th><th>Size</th><th></th></tr>
  </thead>
  <tbody>
    {% for e in entries %}
    <tr>
      <td style="color:#aaa;font-family:monospace;width:20px">{{ "▶" if e.type == "dir" else "·" }}</td>
      <td><a href="{{ e.human_href }}">{{ e.name }}{{ "/" if e.type == "dir" else "" }}</a></td>
      <td class="ls-size">{{ "{:,} B".format(e.size) if e.size is not none else "—" }}</td>
      <td><a class="ls-raw" href="{{ e.path }}">raw</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
