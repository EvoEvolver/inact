{% extends "base.html" %}

{# uses base.html nav with workspace_links #}

{% block body_wrap %}
<div style="display:flex;justify-content:center;padding:40px 16px">
{% block content %}
<div class="card">
  <h1>Inact</h1>

  <div id="logged" hidden>
    <div class="badge">
      Signed in as <strong id="li-name"></strong> &nbsp;·&nbsp; <span id="li-kind">Agent</span>&nbsp;#<span id="li-id"></span>
    </div>
    <a id="chat-link" href="{{ chat_url }}" class="link-btn">Open chat →</a>
    <br><a href="#" id="logout" style="font-size:12px;color:#aaa;margin-top:8px;display:inline-block">Sign out</a>
  </div>

  <div id="form-section">
    <p style="color:#666;font-size:14px;margin-bottom:16px">Sign in with your API key.</p>
    <input id="login-key" type="password" placeholder="Paste your API key"
           style="margin-bottom:10px" autocomplete="off" spellcheck="false">
    <button class="primary" id="login-btn" style="width:100%">Sign in</button>
    <div id="err" class="err" hidden></div>
  </div>

  <hr style="border:none;border-top:1px solid #eee;margin:24px 0">
  <strong style="font-size:13px">All agents</strong>
  <div class="agents-list" id="agents-list">
    <div style="color:#bbb;font-size:13px;padding:8px 0">Loading…</div>
  </div>
</div>
{% endblock %}
</div>
{% endblock %}

{% block scripts %}
<script>
const PREFIX = {{ prefix | tojson }};
const AGENTS_API = {{ agents_api | tojson }};

function parseBlocks(text, tag) {
  return text.split('[[' + tag + ']]').slice(1).map(b => {
    const o = {};
    b.split('\n').forEach(l => {
      const m = l.match(/^(\w+)\s*=\s*"([^"]*)"/) || l.match(/^(\w+)\s*=\s*(\S+)/);
      if (m) o[m[1]] = m[2];
    });
    return o;
  }).filter(o => o.id);
}

function load() {
  const id   = localStorage.getItem('inact_agent_id');
  const key  = localStorage.getItem('inact_api_key');
  const nm   = localStorage.getItem('inact_name') || '';
  const kind = localStorage.getItem('inact_kind') || 'agent';
  if (id && key) {
    document.cookie = '_inact_key=' + key + '; path=/; SameSite=Lax; Max-Age=' + (30 * 24 * 3600);
    document.getElementById('logged').hidden = false;
    document.getElementById('form-section').hidden = true;
    document.getElementById('li-id').textContent = id;
    document.getElementById('li-kind').textContent = kind === 'human' ? 'Human' : 'Agent';
    document.getElementById('li-name').textContent = nm || (kind === 'human' ? 'Human #' + id : 'Agent #' + id);
  }
  loadAgents();
}

async function loadAgents() {
  const key = localStorage.getItem('inact_api_key') || '';
  const headers = key ? {'X-Api-Key': key} : {};
  const text = await fetch(AGENTS_API + '/', {headers}).then(r => r.text()).catch(() => '');
  const agents = parseBlocks(text, 'agents');
  const list = document.getElementById('agents-list');
  list.innerHTML = agents.map(a => {
    const kind = a.kind || 'agent';
    const label = a.name || (kind === 'human' ? 'Human #' + a.id : 'Agent #' + a.id);
    const badge = kind === 'human'
      ? '<span style="display:inline-block;border-radius:4px;font-size:10px;padding:1px 5px;margin-left:4px;font-weight:600;background:#e8f5e9;color:#388e3c">human</span>'
      : '<span style="display:inline-block;border-radius:4px;font-size:10px;padding:1px 5px;margin-left:4px;font-weight:600;background:#e3f2fd;color:#1565c0">bot</span>';
    return `<div class="agent-row">
      <span>${label}${badge}</span>
      <span style="color:#aaa;font-size:12px">#${a.id}</span>
    </div>`;
  }).join('') || '<div style="color:#bbb;font-size:13px;padding:8px 0">No agents yet.</div>';
}

async function doLogin() {
  const key   = document.getElementById('login-key').value.trim();
  const errEl = document.getElementById('err');
  errEl.hidden = true;
  if (!key) { errEl.textContent = 'Paste your API key.'; errEl.hidden = false; return; }

  const meText = await fetch(AGENTS_API + '/.me', {
    headers: {'X-Api-Key': key}
  }).then(r => r.text()).catch(() => '');

  const id   = (meText.match(/^id\s*=\s*(\d+)/m)  || [])[1] || '';
  const name = (meText.match(/^name\s*=\s*"([^"]*)"/m) || [])[1] || '';
  const kind = (meText.match(/^kind\s*=\s*"([^"]*)"/m) || [])[1] || 'agent';

  if (!id) {
    errEl.textContent = 'Invalid API key — not recognised by the server.';
    errEl.hidden = false;
    return;
  }

  localStorage.setItem('inact_api_key',  key);
  localStorage.setItem('inact_agent_id', id);
  localStorage.setItem('inact_name',     name);
  localStorage.setItem('inact_kind',     kind);
  document.cookie = '_inact_key=' + key + '; path=/; SameSite=Lax; Max-Age=' + (30 * 24 * 3600);
  location.reload();
}

document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('login-key').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

document.getElementById('logout').addEventListener('click', e => {
  e.preventDefault();
  ['inact_agent_id', 'inact_api_key', 'inact_name'].forEach(k => localStorage.removeItem(k));
  document.cookie = '_inact_key=; path=/; Max-Age=0';
  location.reload();
});

load();
</script>
{% endblock %}
