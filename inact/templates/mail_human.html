{% extends "base.html" %}
{% block content %}
<h1 class="page-title">Mailbox</h1>

<div class="tabs">
  <button class="tab-btn active" data-group="mail" data-target="pane-inbox">Inbox</button>
  <button class="tab-btn"        data-group="mail" data-target="pane-sent">Sent</button>
  <button class="tab-btn"        data-group="mail" data-target="pane-compose">Compose</button>
</div>

{# ── Inbox ── #}
<div id="pane-inbox" class="tab-pane" data-group="mail">
  <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center">
    <label style="font-size:13px">
      <input type="checkbox" id="unread-only"> Unread only
    </label>
    <button class="primary" id="refresh-btn" style="padding:5px 12px;font-size:13px">Refresh</button>
  </div>
  <div id="inbox-list"><p style="color:#aaa;font-size:14px">Loading…</p></div>
  <div id="msg-view" hidden style="margin-top:20px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <button onclick="closeMsg()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#888">←</button>
      <strong id="msg-subject" style="font-size:15px"></strong>
    </div>
    <div class="meta-box" id="msg-meta"></div>
    <div class="md" id="msg-body" style="white-space:pre-wrap;font-size:14px;line-height:1.6"></div>
  </div>
</div>

{# ── Sent ── #}
<div id="pane-sent" class="tab-pane" data-group="mail" hidden>
  <div id="sent-list"><p style="color:#aaa;font-size:14px">Loading…</p></div>
</div>

{# ── Compose ── #}
<div id="pane-compose" class="tab-pane" data-group="mail" hidden>
  <div style="display:flex;flex-direction:column;gap:10px;max-width:560px">
    <input id="c-to"      placeholder="To  (email address)">
    <input id="c-subject" placeholder="Subject">
    <textarea id="c-body" placeholder="Message…" style="height:160px;resize:vertical;border:1px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit"></textarea>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="primary" id="c-send">Send</button>
      <span id="c-status" style="font-size:13px;color:#666"></span>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const P   = {{ prefix | tojson }};
const KEY = localStorage.getItem('inact_api_key') || '';
function H(extra) {
  const h = {'X-Api-Key': KEY};
  return Object.assign(h, extra || {});
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function parseBlocks(text, tag) {
  return text.split('[[' + tag + ']]').slice(1).map(b => {
    const o = {};
    b.split('\n').forEach(l => {
      const m = l.match(/^(\w+)\s*=\s*"([^"]*)"/) || l.match(/^(\w+)\s*=\s*(\S+)/);
      if (m) o[m[1]] = m[2];
    });
    return o;
  }).filter(o => Object.keys(o).length > 0);
}

/* ── Tab switch ── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const g = btn.dataset.group;
    document.querySelectorAll(`.tab-btn[data-group="${g}"]`).forEach(b => b.classList.remove('active'));
    document.querySelectorAll(`.tab-pane[data-group="${g}"]`).forEach(p => p.hidden = true);
    btn.classList.add('active');
    const pane = document.getElementById(btn.dataset.target);
    pane.hidden = false;
    if (btn.dataset.target === 'pane-sent') loadSent();
  });
});

/* ── Inbox ── */
async function loadInbox() {
  const unread = document.getElementById('unread-only').checked ? '&unread=1' : '';
  const text = await fetch(`${P}/inbox?per_page=50${unread}`, {headers: H()}).then(r => r.text()).catch(() => '');
  const msgs = parseBlocks(text, 'messages');
  const list = document.getElementById('inbox-list');
  document.getElementById('msg-view').hidden = true;
  if (!msgs.length) {
    list.innerHTML = `<p style="color:#aaa;font-size:14px">${unread ? 'No unread messages.' : 'Inbox empty.'}</p>`;
    return;
  }
  list.innerHTML = msgs.map(m => `
    <div class="toml-scalars" style="margin-bottom:8px;cursor:pointer" onclick="openMsg(${JSON.stringify(m.id)})">
      <table><tr>
        <td class="kkey" style="${m.read==='false'?'font-weight:700':''}">${esc(m.subject)}</td>
        <td class="kval" style="color:#888;font-size:12px">${esc(m.from)} · ${esc(m.date)}</td>
        <td class="kval" style="width:40px;text-align:right">
          ${m.read==='false' ? '<span style="background:#0066cc;color:#fff;border-radius:9px;padding:1px 7px;font-size:11px">new</span>' : ''}
        </td>
      </tr></table>
    </div>`).join('');
}

async function openMsg(id) {
  const text = await fetch(`${P}/inbox/${id}`, {headers: H()}).then(r => r.text());
  const lines = text.split('\n---\n\n');
  const body  = (lines[1] || '').trim();
  const meta  = lines[0] || '';
  const subject = (meta.match(/^# (.+)/m) || [])[1] || '(no subject)';
  const from    = (meta.match(/from\s*=\s*"([^"]+)"/) || [])[1] || '';
  const date    = (meta.match(/date\s*=\s*"([^"]+)"/) || [])[1] || '';

  document.getElementById('msg-subject').textContent = subject;
  document.getElementById('msg-meta').innerHTML =
    `<dt>From</dt><dd>${esc(from)}</dd><dt>Date</dt><dd>${esc(date)}</dd>`;
  document.getElementById('msg-body').textContent = body;
  document.getElementById('inbox-list').hidden = true;
  document.getElementById('msg-view').hidden = false;
}

function closeMsg() {
  document.getElementById('inbox-list').hidden = false;
  document.getElementById('msg-view').hidden = true;
  loadInbox();
}

document.getElementById('refresh-btn').addEventListener('click', loadInbox);
document.getElementById('unread-only').addEventListener('change', loadInbox);

/* ── Sent ── */
async function loadSent() {
  const text = await fetch(`${P}/sent?per_page=50`, {headers: H()}).then(r => r.text()).catch(() => '');
  const msgs = parseBlocks(text, 'messages');
  const list = document.getElementById('sent-list');
  if (!msgs.length) { list.innerHTML = '<p style="color:#aaa;font-size:14px">No sent mail.</p>'; return; }
  list.innerHTML = msgs.map(m => `
    <div class="toml-scalars" style="margin-bottom:8px">
      <table><tr>
        <td class="kkey">${esc(m.subject)}</td>
        <td class="kval" style="color:#888;font-size:12px">To: ${esc(m.to)} · ${esc(m.date)}</td>
      </tr></table>
    </div>`).join('');
}

/* ── Compose ── */
document.getElementById('c-send').addEventListener('click', async () => {
  const to      = document.getElementById('c-to').value.trim();
  const subject = document.getElementById('c-subject').value.trim();
  const body    = document.getElementById('c-body').value.trim();
  const status  = document.getElementById('c-status');
  if (!to || !body) { status.textContent = 'To and body are required.'; return; }
  status.textContent = 'Sending…';
  const r = await fetch(`${P}/send`, {
    method: 'POST',
    headers: H({'Content-Type': 'application/json'}),
    body: JSON.stringify({to, subject: subject || '(no subject)', body}),
  });
  const text = await r.text();
  status.textContent = text.startsWith('OK') ? '✓ Sent' : text.split('\n')[0];
  if (text.startsWith('OK')) {
    document.getElementById('c-to').value = '';
    document.getElementById('c-subject').value = '';
    document.getElementById('c-body').value = '';
  }
});

loadInbox();
</script>
{% endblock %}
